<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comsign - Digital Product Library</title>
    
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root {
            --neon-blue: #00d4ff;
            --deep-bg: #050505;
        }

        body {
            background-color: var(--deep-bg);
            color: white;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            opacity: 1.0; 
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
            transform: scale(1.03);
            background: rgba(255, 255, 255, 0.07);
        }

        .section-title {
            border-right: 3px solid var(--neon-blue);
            padding: 0 15px;
            margin-bottom: 25px;
            text-shadow: 0 0 8px var(--neon-blue);
            letter-spacing: 0.05em;
        }

        #book-viewer {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 1000;
        }

        .swiper-slide {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        .swiper-slide img {
            max-height: 90vh;
            max-width: 95vw;
            object-fit: contain;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        #settings-panel {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(2, 8, 18, 0.98);
            z-index: 2000;
            overflow-y: auto;
            padding: 2rem;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 1.5rem;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 50;
            background-color: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .academy-title {
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 2px;
            color: var(--neon-blue);
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <header class="p-4 md:p-6 flex justify-between items-center border-b border-cyan-900/30 relative z-50">
        <div class="flex-1">
            <img src="logo.png" alt="Company Logo" id="logo" class="h-10 md:h-14 cursor-pointer select-none" title="לחץ לחיצה ארוכה להגדרות">
        </div>

        <div class="flex-1 text-center flex justify-center items-center">
            <img src="academy_title.png" alt="Comda Academy" class="h-10 md:h-14 object-contain" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
            <h1 class="academy-title hidden">Comda Academy</h1>
        </div>

        <div class="flex-1 flex justify-end">
            <button onclick="toggleLanguage()" class="glass-card px-5 py-2 text-xs font-bold tracking-widest uppercase" id="lang-btn">EN</button>
        </div>
    </header>

    <main class="p-6 md:p-10 relative z-10" id="main-content">
        <div id="sections-container" class="max-w-7xl mx-auto"></div>
    </main>

    <div id="book-viewer">
        <button onclick="closeViewer()" class="absolute top-2 right-2 md:top-4 md:right-4 z-[1100] glass-card px-6 py-2 md:px-8 md:py-3 font-bold text-sm md:text-base" id="btn-close">סגור</button>
        <div class="swiper mySwiper w-full h-full">
            <div class="swiper-wrapper" id="viewer-wrapper"></div>
            <div class="swiper-pagination"></div>
        </div>
    </div>

    <div id="settings-panel">
        <div class="max-w-5xl mx-auto">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-3xl font-light text-cyan-400">ניהול קטלוג מוצרים</h2>
                <button onclick="closeSettings()" class="bg-cyan-600 px-8 py-2 rounded-full transition shadow-lg shadow-cyan-900/40">שמור ועדכן</button>
            </div>
            <div id="current-products-list" class="mt-10 grid grid-cols-1 md:grid-cols-3 gap-3"></div>
        </div>
    </div>

    <script>
        let appData = {
            lang: 'he',
            ui: { close: { he: 'חזרה לקטלוג', en: 'Back to Gallery' },
                  categories: { id: { he: 'מוצרי הזדהות חזקה', en: 'Strong Identification' }, 
                                sign: { he: 'מוצרי חתימה דיגיטלית', en: 'Digital Signature' }, 
                                secure: { he: 'מוצרי ארכוב ואבטחה', en: 'Archiving & Security' },
                                courses: { he: 'קורסים מקצועיים', en: 'Professional Courses' } } },
            products: [
                { id: 1, cat: 'id', folder: 'ccms', nameHe: 'CCMS', nameEn: 'CCMS', thumb: 'ccms.jpg' },
                { id: 2, cat: 'id', folder: 'mfa', nameHe: 'Win-MFA', nameEn: 'Win-MFA', thumb: 'mfa.jpg' },
                { id: 3, cat: 'id', folder: 'otp', nameHe: 'OTP Authenticator', nameEn: 'OTP Authenticator', thumb: 'otp.jpg' },
                { id: 12, cat: 'id', folder: 'traceband', nameHe: 'TraceBand', nameEn: 'TraceBand', thumb: 'traceband.jpg' },
                { id: 15, cat: 'id', folder: 'mobilewallet', nameHe: 'Mobile Wallet', nameEn: 'Mobile Wallet', thumb: 'mobilewallet.jpg' },
                { id: 4, cat: 'sign', folder: 'signer', nameHe: 'SIGNER PQ', nameEn: 'SIGNER PQ', thumb: 'signer.jpg' },
                { id: 5, cat: 'sign', folder: 'wwsign', nameHe: 'Wesign AI', nameEn: 'Wesign AI', thumb: 'wwsign.jpg' },
                { id: 6, cat: 'sign', folder: 'code', nameHe: 'Secure Code Signing', nameEn: 'Secure Code Signing', thumb: 'code.jpg' },
                { id: 7, cat: 'sign', folder: 'ctd', nameHe: 'CTD', nameEn: 'CTD', thumb: 'ctd.jpg' },
                { id: 13, cat: 'sign', folder: 'tabletsign', nameHe: 'TabletSign', nameEn: 'TabletSign', thumb: 'tabletsign.jpg' },
                { id: 8, cat: 'secure', folder: 'vault', nameHe: 'Secure Vault', nameEn: 'Secure Vault', thumb: 'vault.jpg' },
                { id: 9, cat: 'secure', folder: 'certm', nameHe: 'CertM PQ', nameEn: 'CertM PQ', thumb: 'certm.jpg' },
                { id: 10, cat: 'secure', folder: 'ai', nameHe: 'Comsign AI', nameEn: 'Comsign AI', thumb: 'ai.jpg' },
                { id: 11, cat: 'secure', folder: 'archive', nameHe: 'Digital Archive', nameEn: 'Digital Archive', thumb: 'archive.jpg' },
                { id: 14, cat: 'secure', folder: 'securechain', nameHe: 'SecureChain', nameEn: 'SecureChain', thumb: 'securechain.jpg' },
                { id: 101, cat: 'courses', folder: 'pki', nameHe: 'PKI', nameEn: 'PKI', thumb: 'pki.jpg' },
                { id: 102, cat: 'courses', folder: 'quantum', nameHe: 'Quantum', nameEn: 'Quantum', thumb: 'quantum.jpg' },
                { id: 103, cat: 'courses', folder: 'desfire', nameHe: 'DESFire', nameEn: 'DESFire', thumb: 'desfire.jpg' },
                { id: 104, cat: 'courses', folder: 'blockchain', nameHe: 'Blockchain', nameEn: 'Blockchain', thumb: 'blockchain.jpg' }
            ]
        };

        // אובייקט לאחסון תמונות שנטענו מראש כדי למנוע בקשות חוזרות
        const loadedAssets = new Map();

        if(localStorage.getItem('comsignCatalogData')) {
            appData = JSON.parse(localStorage.getItem('comsignCatalogData'));
        }

        function init() { 
            renderContent(); 
            initBackground(); 
            setupLongPress(); 
            // התחלת טעינה מראש של כל התמונות מיד עם עליית האפליקציה
            setTimeout(preloadAllImages, 1000); 
        }

        async function preloadAllImages() {
            console.log("Starting background preload...");
            for (const product of appData.products) {
                const subFolders = ['he', 'en'];
                for (const sub of subFolders) {
                    // טעינת תמונת התצוגה המקדימה
                    const thumbUrl = `${product.folder}/${sub}/${product.thumb}`;
                    checkImageExists(thumbUrl);

                    // ניסיון טעינה מראש של עד 20 שקפים לכל מוצר (ניתן להגדיל)
                    for (let i = 1; i <= 30; i++) {
                        const slideUrl = `${product.folder}/${sub}/${product.folder}_page${i}.jpg`;
                        // אנחנו לא מחכים (await) כדי לא לחסום את הדף, פשוט שולחים בקשה שתישמר ב-Cache
                        checkImageExists(slideUrl);
                    }
                }
            }
        }

        function renderContent() {
            const container = document.getElementById('sections-container');
            container.innerHTML = '';
            document.documentElement.dir = appData.lang === 'he' ? 'rtl' : 'ltr';
            document.getElementById('lang-btn').innerText = appData.lang === 'he' ? 'EN' : 'HE';
            document.getElementById('btn-close').innerText = appData.ui.close[appData.lang];

            ['id', 'sign', 'secure', 'courses'].forEach(catKey => {
                const sectionProducts = appData.products.filter(p => p.cat === catKey);
                if(sectionProducts.length === 0) return;
                const sectionHtml = `
                    <section class="mb-14">
                        <h2 class="text-xl font-bold section-title uppercase text-cyan-400">${appData.ui.categories[catKey][appData.lang]}</h2>
                        <div class="product-grid">
                            ${sectionProducts.map(p => {
                                const subFolder = appData.lang === 'en' ? 'en' : 'he';
                                const thumbSrc = `${p.folder}/${subFolder}/${p.thumb}`;
                                return `
                                <div class="glass-card p-3 cursor-pointer text-center group" onclick="openBook(${p.id})">
                                    <div class="aspect-square mb-3 overflow-hidden rounded-lg bg-black/40">
                                        <img src="${thumbSrc}" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition" onerror="this.src='https://via.placeholder.com/150?text=No+Cover'">
                                    </div>
                                    <p class="text-xs font-semibold truncate text-gray-200 group-hover:text-cyan-400">${appData.lang === 'he' ? p.nameHe : p.nameEn}</p>
                                </div>`;
                            }).join('')}
                        </div>
                    </section>`;
                container.innerHTML += sectionHtml;
            });
        }

        let swiperInstance;
        
        async function openBook(prodId) {
            const product = appData.products.find(p => p.id === prodId);
            const wrapper = document.getElementById('viewer-wrapper');
            const subFolder = appData.lang === 'en' ? 'en' : 'he';
            
            wrapper.innerHTML = '';
            document.getElementById('book-viewer').style.display = 'block';

            let foundSlides = 0;
            const maxTry = 100;

            for (let i = 1; i <= maxTry; i++) {
                const fileName = `${product.folder}_page${i}.jpg`;
                const src = `${product.folder}/${subFolder}/${fileName}`;
                
                // בגלל ה-Preload, הבדיקה הזו תהיה מהירה מאוד (מהזיכרון)
                const slideExists = await checkImageExists(src);
                if (slideExists) {
                    const slideDiv = document.createElement('div');
                    slideDiv.className = 'swiper-slide';
                    slideDiv.innerHTML = `<img src="${src}" loading="lazy">`;
                    wrapper.appendChild(slideDiv);
                    foundSlides++;
                } else {
                    break;
                }
            }

            if (foundSlides === 0) {
                wrapper.innerHTML = '<div class="swiper-slide text-white">לא נמצאו שקפים בתיקייה</div>';
            }

            if(swiperInstance) swiperInstance.destroy();
            swiperInstance = new Swiper(".mySwiper", {
                effect: "creative", speed: 600,
                creativeEffect: {
                    prev: { shadow: true, translate: [appData.lang === 'he' ? "120%" : "-120%", 0, -500], rotate: [0, 0, -10] },
                    next: { shadow: true, translate: [appData.lang === 'he' ? "-120%" : "120%", 0, -500], rotate: [0, 0, 10] },
                },
                pagination: { el: ".swiper-pagination", dynamicBullets: true },
            });
        }

        // פונקציה משופרת שמשתמשת ב-Cache פנימי
        function checkImageExists(url) {
            if (loadedAssets.has(url)) return Promise.resolve(loadedAssets.get(url));

            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    loadedAssets.set(url, true);
                    resolve(true);
                };
                img.onerror = () => {
                    loadedAssets.set(url, false);
                    resolve(false);
                };
                img.src = url;
            });
        }

        function closeViewer() { document.getElementById('book-viewer').style.display = 'none'; if(swiperInstance) swiperInstance.destroy(); }
        function toggleLanguage() { appData.lang = appData.lang === 'he' ? 'en' : 'he'; renderContent(); saveData(); }
        
        function setupLongPress() {
            const logo = document.getElementById('logo');
            let timer;
            const start = () => timer = setTimeout(() => { document.getElementById('settings-panel').style.display = 'block'; refreshSettingsList(); }, 3000);
            const cancel = () => clearTimeout(timer);
            logo.addEventListener('mousedown', start); logo.addEventListener('mouseup', cancel); logo.addEventListener('mouseleave', cancel);
            logo.addEventListener('touchstart', start); logo.addEventListener('touchend', cancel);
        }

        function refreshSettingsList() {
            const list = document.getElementById('current-products-list');
            list.innerHTML = appData.products.map(p => `<div class="flex justify-between items-center bg-white/5 p-3 rounded-lg text-xs"><span>${p.nameHe}</span></div>`).join('');
        }

        function closeSettings() { document.getElementById('settings-panel').style.display = 'none'; renderContent(); }
        function saveData() { localStorage.setItem('comsignCatalogData', JSON.stringify(appData)); }

        function initBackground() {
            const canvas = document.getElementById('bg-canvas');
            const ctx = canvas.getContext('2d');
            let w, h, p = [];
            const res = () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; };
            window.addEventListener('resize', res); res();
            class Part { 
                constructor() { this.reset(); } 
                reset() { 
                    this.x = Math.random()*w; 
                    this.y = Math.random()*h; 
                    this.sx = (Math.random()-0.5)*0.8; 
                    this.sy = (Math.random()-0.5)*0.8; 
                }
                up() { 
                    this.x+=this.sx; 
                    this.y+=this.sy; 
                    if(this.x>w||this.x<0||this.y>h||this.y<0) this.reset(); 
                } 
            }
            for(let i=0; i<80; i++) p.push(new Part());
            function anim() {
                ctx.clearRect(0,0,w,h);
                p.forEach(i => { 
                    i.up(); 
                    ctx.fillStyle='rgba(0,212,255,0.8)'; 
                    ctx.beginPath(); 
                    ctx.arc(i.x,i.y,1,0,7); 
                    ctx.fill(); 
                });
                for(let i=0; i<p.length; i++) for(let j=i; j<p.length; j++) {
                    let d = Math.hypot(p[i].x-p[j].x, p[i].y-p[j].y);
                    if(d<120) { 
                        ctx.strokeStyle=`rgba(0,212,255,${0.4-d/400})`; 
                        ctx.beginPath(); 
                        ctx.moveTo(p[i].x,p[i].y); 
                        ctx.lineTo(p[j].x,p[j].y); 
                        ctx.stroke(); 
                    }
                } requestAnimationFrame(anim);
            } anim();
        }
        init();
    </script>
</body>
</html>
